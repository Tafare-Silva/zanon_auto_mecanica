{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Registrar Pagamento - {{ cliente.nome }}</h1>
    <div class="bg-white rounded-lg shadow-md p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Cliente</label>{{ form.cliente }}</div>
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Ordem de Serviço (opcional)</label>{{ form.ordem_servico }}</div>
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Valor *</label>{{ form.valor }}</div>
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Data do Pagamento</label>{{ form.data_pagamento }}</div>
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Observações</label>{{ form.observacoes }}</div>
            <div class="flex justify-end space-x-4 pt-6 border-t">
                <a href="{% url 'crediario_lista' %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg">Cancelar</a>
                <button type="submit" class="px-6 py-3 bg-green-600 text-white rounded-lg"><i class="fas fa-save mr-2"></i>Registrar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
