{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <div class="text-center mb-6">
            <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Confirmar Exclusão</h1>
            <p class="text-gray-600">Excluir produto da OS #{{ os.numero }}?</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center space-x-4">
                <a href="{% url 'os_editar' os.pk %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg">Cancelar</a>
                <button type="submit" class="px-6 py-3 bg-red-600 text-white rounded-lg">Confirmar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
