{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Adicionar Produto - OS #{{ os.numero }}</h1>
    <div class="bg-white rounded-lg shadow-md p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Descrição *</label>{{ form.descricao }}</div>
            <div class="grid grid-cols-2 gap-6">
                <div><label class="block text-sm font-medium text-gray-700 mb-2">Quantidade *</label>{{ form.quantidade }}</div>
                <div><label class="block text-sm font-medium text-gray-700 mb-2">Valor Unitário *</label>{{ form.valor_unitario }}</div>
            </div>
            <div class="flex justify-end space-x-4 pt-6 border-t">
                <a href="{% url 'os_editar' os.pk %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg">Cancelar</a>
                <button type="submit" class="px-6 py-3 bg-purple-600 text-white rounded-lg"><i class="fas fa-plus mr-2"></i>Adicionar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
